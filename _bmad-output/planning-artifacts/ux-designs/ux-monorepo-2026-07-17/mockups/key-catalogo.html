<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Llano — Catálogo (mock visual)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
/*
  Governs: DESIGN.md — Colors, Typography, Layout & Spacing, Elevation & Depth,
  Shapes, Components (Header/Nav, Category Chip, Product Card, Cart Badge, Session Widget).
  EXPERIENCE.md — Information Architecture (Catálogo row), Component Patterns
  (Product Card, Category Chip, Header/Nav), Accessibility Floor (aria-pressed on
  chips, aria-label accessible name on Product Card button, alt="" decorative image),
  Responsive & Platform (>=lg: grid 3-4 columns, header nav completa en línea).
  This screen is Catálogo "at rest" (no filtro sin resultados, no skeleton state —
  those are separate State Patterns rows, not depicted here).

  Font stand-ins (no external fonts/CDN allowed per task constraints):
  --font-serif stands in for Fraunces (DESIGN.md typography.display-lg/headline-*).
  --font-sans stands in for Inter (DESIGN.md typography.body-*/label/caption).
*/
:root {
  --color-bg: #FFFFFF;
  --color-surface: #FFFFFF;
  --color-surface-alt: #F7F7F6;
  --color-surface-container: #EFEFED;
  --color-border: #E0E0DD;
  --color-border-strong: #8A8A85;
  --color-ink: #141414;
  --color-ink-muted: #5C5C58;
  --color-ink-faint: #9A9A95;
  --color-accent: #B8432B;
  --color-accent-hover: #96351F;
  --color-accent-foreground: #FFFFFF;
  --color-success: #3F6B4E;
  --color-success-foreground: #FFFFFF;
  --color-error: #B3261E;
  --color-error-foreground: #FFFFFF;

  --font-serif: Georgia, 'Times New Roman', serif; /* stand-in for Fraunces */
  --font-sans: -apple-system, Helvetica, Arial, sans-serif; /* stand-in for Inter */

  --radius-sm: 2px;
  --radius-default: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-full: 9999px;

  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-6: 24px;
  --sp-8: 32px; --sp-12: 48px; --sp-16: 64px;
  --gutter: 24px;
  --margin-desktop: 80px;
  --editorial-gap: 96px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--color-bg);
  color: var(--color-ink);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.5;
  padding-top: 72px; /* offset for fixed header */
}
a { color: inherit; }
button { font-family: inherit; }
*:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

/* Typography tokens */
.display-lg { font-family: var(--font-serif); font-size: 56px; font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; margin: 0; }
.headline-md { font-family: var(--font-serif); font-size: 32px; font-weight: 400; line-height: 1.15; margin: 0; }
.headline-sm { font-family: var(--font-serif); font-size: 22px; font-weight: 400; line-height: 1.25; margin: 0; }
.body-lg { font-family: var(--font-sans); font-size: 17px; font-weight: 400; line-height: 1.55; }
.body-md { font-family: var(--font-sans); font-size: 15px; font-weight: 400; line-height: 1.5; }
.label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; line-height: 1.3; letter-spacing: 0.04em; text-transform: uppercase; }
.caption { font-family: var(--font-sans); font-size: 12px; font-weight: 400; line-height: 1.4; }

/* Buttons */
.btn { font-size: 15px; border: none; cursor: pointer; padding: var(--sp-3) var(--sp-6); border-radius: var(--radius-sm); }
.btn-primary { background: var(--color-accent); color: var(--color-accent-foreground); }
.btn-primary:hover { background: var(--color-accent-hover); }
.btn-secondary { background: transparent; color: var(--color-ink); border: 1px solid var(--color-border-strong); }
.btn-secondary:hover { border-color: var(--color-ink); }

/* Header/Nav — persistent, identical across the 3 surfaces */
.llano-header { position: fixed; top: 0; left: 0; right: 0; background: var(--color-surface); border-bottom: 1px solid var(--color-border); z-index: 100; }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 0 var(--margin-desktop); height: 72px; display: flex; align-items: center; justify-content: space-between; }
.brand { font-family: var(--font-serif); font-size: 24px; color: var(--color-ink); text-decoration: none; }
.header-nav { display: flex; align-items: center; gap: var(--sp-6); }
.nav-link { font-family: var(--font-sans); font-size: 15px; color: var(--color-ink); text-decoration: none; }
.icon-btn { position: relative; background: none; border: none; cursor: pointer; padding: var(--sp-2); display: flex; align-items: center; justify-content: center; color: var(--color-ink); }
.icon { width: 22px; height: 22px; }
.cart-badge { position: absolute; top: 0px; right: 0px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: var(--radius-full); background: var(--color-accent); color: var(--color-accent-foreground); font-family: var(--font-sans); font-size: 11px; line-height: 16px; text-align: center; }
.session-icon { width: 30px; height: 30px; border-radius: var(--radius-full); background: var(--color-surface-container); display: flex; align-items: center; justify-content: center; color: var(--color-ink-muted); }

/* Page shell */
.page { max-width: 1280px; margin: 0 auto; padding: 0 var(--margin-desktop); }

/* Catálogo hero */
.hero { padding-top: var(--sp-16); padding-bottom: var(--editorial-gap); }
.hero-sub { color: var(--color-ink-muted); margin-top: var(--sp-2); }

/* Category Chip row */
.chip-row { display: flex; gap: var(--sp-2); padding-bottom: var(--sp-12); flex-wrap: wrap; }
.chip { font-family: var(--font-sans); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; padding: var(--sp-2) var(--sp-4); border: 1px solid var(--color-border-strong); border-radius: var(--radius-sm); background: transparent; color: var(--color-ink); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.chip.is-active { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-accent-foreground); }

/* Product grid — >=lg: 3-4 columns (Responsive & Platform) */
.product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gutter); padding-bottom: var(--sp-16); }

.product-card { position: relative; display: flex; flex-direction: column; text-align: left; background: var(--color-surface); border: none; padding: 0; cursor: pointer; font-family: inherit; border-radius: var(--radius-default); transition: box-shadow .15s ease; width: 100%; }
.product-card:hover, .product-card.is-hover-demo { box-shadow: 0 4px 12px rgba(20,20,20,0.06); }
.product-image { aspect-ratio: 4 / 5; background: var(--color-surface-container); border-radius: var(--radius-default); display: flex; align-items: center; justify-content: center; }
.product-image span { font-family: var(--font-sans); font-size: 12px; color: var(--color-ink-faint); text-transform: uppercase; letter-spacing: 0.04em; }
.product-info { padding: var(--sp-3) var(--sp-1) 0; }
.product-title { font-family: var(--font-serif); font-size: 22px; line-height: 1.25; color: var(--color-ink); display: block; transition: transform .15s ease; }
.product-card:hover .product-title, .product-card.is-hover-demo .product-title { transform: translateY(-2px); }
.product-price { font-family: var(--font-sans); font-size: 15px; color: var(--color-accent); display: block; margin-top: 4px; }

.hover-demo-tag { position: absolute; top: -12px; left: 8px; background: var(--color-surface); border: 1px solid var(--color-border-strong); padding: 2px 6px; font-family: var(--font-sans); font-size: 11px; color: var(--color-ink-muted); border-radius: var(--radius-sm); z-index: 2; }
</style>
</head>
<body>

<header class="llano-header">
  <div class="header-inner">
    <a class="brand" href="#" aria-label="Llano — inicio">Llano</a>
    <nav class="header-nav" aria-label="Navegación principal">
      <a class="nav-link" href="#">Catálogo</a>
      <button class="icon-btn" type="button" aria-label="Carrito, 2 productos">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" focusable="false">
          <path d="M6 8h12l-1 12H7L6 8z"/>
          <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
        </svg>
        <span class="cart-badge caption" aria-hidden="true">2</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Perfil. Sesión no iniciada">
        <span class="session-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16" focusable="false">
            <circle cx="12" cy="8" r="3.2"/>
            <path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/>
          </svg>
        </span>
      </button>
    </nav>
  </div>
</header>

<main class="page">
  <section class="hero">
    <h1 class="headline-md">Catálogo</h1>
    <p class="body-md hero-sub">Piezas de cerámica, textil y papelería, hechas con cuidado.</p>
  </section>

  <section aria-label="Filtrar por categoría">
    <div class="chip-row" role="group" aria-label="Filtrar por categoría">
      <button class="chip is-active" type="button" aria-pressed="true">✓ Todos</button>
      <button class="chip" type="button" aria-pressed="false">Cerámica</button>
      <button class="chip" type="button" aria-pressed="false">Textil</button>
      <button class="chip" type="button" aria-pressed="false">Papelería</button>
    </div>
  </section>

  <section aria-label="Productos">
    <div class="product-grid">

      <button class="product-card" type="button" aria-label="Agregar Bowl Terroso al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Bowl Terroso</span>
          <span class="product-price">$420</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Jarrón Bajo al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Jarrón Bajo</span>
          <span class="product-price">$680</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Taza Cruda al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Taza Cruda</span>
          <span class="product-price">$180</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Plato Hondo al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Plato Hondo</span>
          <span class="product-price">$260</span>
        </div>
      </button>

      <button class="product-card is-hover-demo" type="button" aria-label="Agregar Manta de Lino al carrito">
        <span class="hover-demo-tag">estado :hover</span>
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Manta de Lino</span>
          <span class="product-price">$950</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Cojín Crudo al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Cojín Crudo</span>
          <span class="product-price">$340</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Tapete Trenzado al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Tapete Trenzado</span>
          <span class="product-price">$1200</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Cuaderno Rayado al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Cuaderno Rayado</span>
          <span class="product-price">$120</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Set de Postales al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Set de Postales</span>
          <span class="product-price">$90</span>
        </div>
      </button>

      <button class="product-card" type="button" aria-label="Agregar Libreta de Bolsillo al carrito">
        <div class="product-image" aria-hidden="true"><span>foto</span></div>
        <div class="product-info">
          <span class="product-title">Libreta de Bolsillo</span>
          <span class="product-price">$75</span>
        </div>
      </button>

    </div>
  </section>
</main>

</body>
</html>
